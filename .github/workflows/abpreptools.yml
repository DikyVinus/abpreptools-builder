name: Build Flashable Partition ZIP

on:
  workflow_dispatch:
    inputs:
      ARCHIVE_URL:
        description: "URL to archive containing *.img partitions"
        required: true
      OUTPUT_NAME:
        description: "Output zip name"
        default: "flashable"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4

      # 1. Install + Download (deterministic filename)
      - run: |
          set -e

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            unzip p7zip-full ca-certificates zip

          mkdir -p input extracted flashable/META-INF/com/google/android

          curl -L --fail --retry 5 --retry-delay 3 \
            "${{ github.event.inputs.ARCHIVE_URL }}" \
            -o input/archive

          [ -s input/archive ] || { echo "Download failed"; exit 1; }

      # 2. Extract + Collect + Validate (tar auto-detect)
      - run: |
          set -e

          shopt -s nullglob

          for f in input/*; do
            case "$f" in
              *.zip) unzip -q "$f" -d extracted ;;
              *.7z) 7z x "$f" -oextracted ;;
              *) tar -xf "$f" -C extracted || { echo "Extraction failed"; exit 1; } ;;
            esac
          done

          # collect imgs (robust)
          find extracted -type f -name "*.img" -exec cp {} flashable/ \;

          COUNT=$(find flashable -maxdepth 1 -name "*.img" | wc -l)
          echo "IMG COUNT: $COUNT"

          [ "$COUNT" -gt 0 ] || { echo "No .img found"; exit 1; }

      # 3. Build zip + release
      - run: |
          set -e

          SCRIPT=flashable/META-INF/com/google/android/updater-script

          echo 'ui_print("Starting flash...");' > "$SCRIPT"

          for f in flashable/*.img; do
            name=$(basename "$f")
            part="${name%.img}"

            echo "ui_print(\"Flashing $part...\");" >> "$SCRIPT"
            echo "package_extract_file(\"$name\", \"/dev/block/by-name/${part}_a\");" >> "$SCRIPT"
            echo "package_extract_file(\"$name\", \"/dev/block/by-name/${part}_b\");" >> "$SCRIPT"
          done

          echo 'run_program("/sbin/sync");' >> "$SCRIPT"
          echo 'ui_print("Flash complete.");' >> "$SCRIPT"

          cp update-binary flashable/META-INF/com/google/android/update-binary
          chmod +x flashable/META-INF/com/google/android/update-binary

          cd flashable
          zip -r9 -Z deflate "../${{ github.event.inputs.OUTPUT_NAME }}.zip" .
          cd ..

          sha256sum "${{ github.event.inputs.OUTPUT_NAME }}.zip" > sha256.txt

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}
          name: flashable-${{ github.run_id }}
          files: |
            ${{ github.event.inputs.OUTPUT_NAME }}.zip
            sha256.txt
